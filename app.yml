# 
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-addons
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Mohamed-Sarhan-Elhussieny/Argo-CD-.git
    targetRevision: HEAD
    path: main

  destination:
    server: https://kubernetes.default.svc
    namespace: myapp

  syncPolicy:
    syncOptions:
      - CreateNamespace=true

    automated:
      prune: true
      selfHeal: true










